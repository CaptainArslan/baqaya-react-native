<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verify Phone Number - Baqaya</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#90000e",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#d6e3ff",
                    "on-tertiary-container": "#ffc9c3",
                    "on-error-container": "#93000a",
                    "surface-tint": "#046b5e",
                    "secondary-container": "#64a1ff",
                    "on-tertiary-fixed-variant": "#93000e",
                    "on-secondary-fixed": "#001b3d",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#84d5c5",
                    "surface-container-low": "#f4f4f1",
                    "surface-variant": "#e2e3e0",
                    "on-primary-container": "#94e5d5",
                    "on-surface-variant": "#3e4946",
                    "tertiary-fixed-dim": "#ffb4ac",
                    "secondary": "#005db7",
                    "primary": "#004f45",
                    "on-background": "#1a1c1b",
                    "on-primary-fixed-variant": "#005046",
                    "surface": "#f9f9f6",
                    "error-container": "#ffdad6",
                    "surface-bright": "#f9f9f6",
                    "outline-variant": "#bec9c5",
                    "on-primary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#003670",
                    "on-surface": "#1a1c1b",
                    "primary-fixed": "#a0f2e1",
                    "on-secondary-fixed-variant": "#00468c",
                    "surface-container": "#eeeeeb",
                    "inverse-primary": "#84d5c5",
                    "error": "#ba1a1a",
                    "background": "#f9f9f6",
                    "surface-container-highest": "#e2e3e0",
                    "primary-container": "#00695c",
                    "secondary-fixed-dim": "#a9c7ff",
                    "tertiary-fixed": "#ffdad6",
                    "tertiary-container": "#b61b1f",
                    "surface-container-lowest": "#ffffff",
                    "inverse-surface": "#2f312f",
                    "inverse-on-surface": "#f1f1ee",
                    "surface-container-high": "#e8e8e5",
                    "surface-dim": "#dadad7",
                    "on-primary-fixed": "#00201b",
                    "outline": "#6e7976",
                    "on-tertiary-fixed": "#410003"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f6;
        }
        .headline-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface flex flex-col items-center">
<!-- Mobile Container Emulator -->
<div class="relative w-full max-w-md bg-background min-h-screen shadow-2xl overflow-hidden flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f6]/85 backdrop-blur-md flex justify-between items-center px-4 h-16 w-full max-w-md mx-auto">
<div class="flex items-center gap-3">
<button class="p-2 transition-all duration-200 active:opacity-70 hover:bg-slate-100 rounded-full">
<span class="material-symbols-outlined text-[#004f45]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#004f45]">Baqaya</h1>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-outline" data-icon="shield_lock">shield_lock</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 pt-24 px-6 flex flex-col">
<!-- Hero Typography Section -->
<div class="mb-10">
<h2 class="text-3xl font-extrabold headline-font text-on-surface tracking-tight mb-3">
                    Verify Phone Number
                </h2>
<div class="flex flex-wrap items-center gap-x-2">
<p class="text-on-surface-variant text-base leading-relaxed">
                        Enter the 4-digit code sent to <span class="font-semibold text-on-surface">+92 3xx xxx4567</span>
</p>
<button class="flex items-center gap-1 text-primary text-sm font-semibold hover:underline active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
<span>Edit Number</span>
</button>
</div>
</div>
<!-- OTP Input Section (Bento-style Card) -->
<div class="bg-surface-container-low rounded-xl p-8 mb-8 transition-all">
<div class="flex justify-between gap-3 max-w-xs mx-auto">
<!-- Digit 1 -->
<div class="w-14 h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center border border-outline-variant">
<span class="text-2xl font-bold headline-font text-on-surface">5</span>
</div>
<!-- Digit 2 -->
<div class="w-14 h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center border border-outline-variant"><span class="text-2xl font-bold headline-font text-on-surface">4</span></div>
<!-- Digit 3 -->
<div class="w-14 h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center border border-outline-variant">
<span class="text-2xl font-bold headline-font text-on-surface">0</span>
</div>
<!-- Digit 4 -->
<div class="w-14 h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center border border-outline-variant">
<span class="text-2xl font-bold headline-font text-on-surface">0</span>
</div>
</div><p class="text-[#DC2626] text-xs font-bold text-center mt-4">Invalid verification code. Please check and try again.</p>
</div>
<!-- Timer & Actions -->
<div class="flex flex-col items-center gap-4 mb-10">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container rounded-full">
<span class="material-symbols-outlined text-sm text-outline" data-icon="schedule">schedule</span>
<span class="text-sm font-medium text-on-surface-variant">Resend code in <span class="text-on-surface font-bold">0:30</span></span>
</div>
<button class="text-sm font-semibold text-primary/50 cursor-not-allowed">
                    Resend OTP
                </button>
</div>
<!-- Primary Action Area -->
<div class="mt-auto pb-8">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-bold headline-font text-lg shadow-[0_8px_30px_rgb(0,79,69,0.15)] flex items-center justify-center gap-2 hover:bg-primary-container transition-all active:scale-95">
                    Verify
                    <span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
</button>
<!-- Shared Footer Support Component (Based on Screen 6) -->
<footer class="w-full flex justify-center items-center gap-8 text-on-surface-variant mt-8">
<div class="flex items-center gap-1.5 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="help">help</span>
<span class="text-xs font-medium font-label">Need help?</span>
</div>
<div class="flex items-center gap-1.5 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="contact_support">contact_support</span>
<span class="text-xs font-medium font-label">Contact Support</span>
</div>
</footer>
</div>
</main>
<!-- Illustration Overlay for Brand Context -->
<div class="absolute -top-16 -right-16 w-48 h-48 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-1/2 -left-16 w-32 h-32 bg-secondary/5 rounded-full blur-2xl pointer-events-none"></div>
<div class="absolute bottom-24 left-6 right-6 bg-[#DC2626] text-white p-4 rounded-xl flex items-center justify-between shadow-lg z-50 animate-bounce-short">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-xl" data-icon="error">error</span>
<p class="text-sm font-medium">Verification failed. Please try again.</p>
</div>
<button class="p-1 hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="close">close</span>
</button>
</div></div>
</body></html>
