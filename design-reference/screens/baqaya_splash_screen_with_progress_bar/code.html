<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Baqaya - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed": "#410003",
                    "on-secondary-fixed-variant": "#00468c",
                    "surface-container-high": "#e8e8e5",
                    "primary": "#004f45",
                    "error": "#ba1a1a",
                    "on-secondary-container": "#003670",
                    "on-primary-container": "#94e5d5",
                    "surface-container": "#eeeeeb",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f4f4f1",
                    "secondary-fixed": "#d6e3ff",
                    "outline": "#6e7976",
                    "on-secondary-fixed": "#001b3d",
                    "surface-variant": "#e2e3e0",
                    "on-surface": "#1a1c1b",
                    "surface-dim": "#dadad7",
                    "error-container": "#ffdad6",
                    "on-surface-variant": "#3e4946",
                    "on-primary-fixed-variant": "#005046",
                    "surface-container-lowest": "#ffffff",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#ffb4ac",
                    "surface-bright": "#f9f9f6",
                    "primary-fixed": "#a0f2e1",
                    "inverse-primary": "#84d5c5",
                    "primary-container": "#00695c",
                    "on-primary-fixed": "#00201b",
                    "secondary-fixed-dim": "#a9c7ff",
                    "secondary": "#005db7",
                    "on-tertiary-fixed-variant": "#93000e",
                    "background": "#f9f9f6",
                    "tertiary-fixed": "#ffdad6",
                    "tertiary-container": "#b61b1f",
                    "on-background": "#1a1c1b",
                    "secondary-container": "#64a1ff",
                    "surface": "#f9f9f6",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#f1f1ee",
                    "primary-fixed-dim": "#84d5c5",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#2f312f",
                    "surface-container-highest": "#e2e3e0",
                    "on-tertiary-container": "#ffc9c3",
                    "surface-tint": "#046b5e",
                    "outline-variant": "#bec9c5",
                    "on-error": "#ffffff",
                    "tertiary": "#90000e"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        .animate-progress {
            animation: progress 2.5s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body antialiased">
<main class="min-h-screen flex flex-col items-center justify-center px-6 relative overflow-hidden">
<!-- Subtle Background Texture -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none" data-alt="soft ethereal gradient background with subtle teal and blue glows on a cream paper texture" style="background-image: radial-gradient(circle at 20% 30%, #a0f2e1 0%, transparent 40%), radial-gradient(circle at 80% 70%, #d6e3ff 0%, transparent 40%);">
</div>
<!-- Main Content Area -->
<div class="z-10 flex flex-col items-center">
<!-- Branding Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-20 h-20 bg-primary rounded-2xl flex items-center justify-center mb-6 shadow-[0_8px_32px_rgba(0,79,69,0.2)]">
<span class="material-symbols-outlined text-white text-5xl" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-headline font-extrabold text-4xl tracking-tight text-primary">Baqaya</h1>
<p class="font-label text-on-surface-variant tracking-[0.2em] text-[11px] font-semibold uppercase mt-2">The Resilient Ledger</p>
</div>
<!-- Linear Progress Bar -->
<div class="w-48 h-1 bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="absolute inset-0 bg-primary animate-progress rounded-full"></div>
</div>
</div>
<!-- Visual Bedrock Element -->
<div class="absolute bottom-12 w-full max-w-md px-10 z-10">
<div class="mt-6 flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-[14px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-[10px] font-label font-bold text-on-surface-variant uppercase tracking-widest">End-to-End Encrypted Data</span>
</div>
</div>
<!-- Background Image Accent (Subtle) -->
<div class="absolute -bottom-20 -right-20 w-64 h-64 bg-secondary-fixed/30 rounded-full blur-[80px] pointer-events-none"></div>
</main>
</body></html>
