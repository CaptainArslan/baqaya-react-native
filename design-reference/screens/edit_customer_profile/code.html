<body class="bg-background text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->

<button class="text-teal-900 dark:text-teal-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:scale-95 duration-150 flex items-center justify-center">

</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-teal-900 dark:text-teal-100">Edit Customer</h1>
</div>
<button class="text-teal-700 dark:text-teal-400 font-semibold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors px-4 py-2 rounded-xl active:scale-95 duration-150">

<section class="flex flex-col items-center mb-10">
<div class="relative group">
<div class="w-28 h-28 rounded-full overflow-hidden border-4 border-surface-container-high shadow-sm">
<img alt="Customer Avatar" class="w-full h-full object-cover bg-surface-container" data-alt="portrait illustration of a professional person with dark hair and friendly expression against a clean teal background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXoKAWKWcDs4gFxEEUEvTsVcS92B2M3FXognqT_N51qdS6emweYOyl8c_Dy3Dw_HvecCo6tBW0aDmqIH1ban0Iwudyf1-ZYn84KQ9f-X8aV2oneTd-lY5fu7ZTSM_iNCZ9Eo8c813cGtYlTITk4y_CXCoEfu3r5vXrOTNkewRNPD88azM5_a9WW0zV0xvLmc3ZiTQNxISNDX_D20vBMcTrb46ykf1Dezq0WRrNeYu0a2RiZXdUh15rifK1u1E2KRDpUb3z2JfWrOHi"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-on-primary w-10 h-10 rounded-full flex items-center justify-center border-4 border-background shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" data-icon="photo_camera">photo_camera</span>
</button>
</div>
<p class="mt-4 text-sm font-medium text-on-surface-variant font-label uppercase tracking-widest">Update Photo</p>
</section>
<!-- Form Fields -->
<div class="space-y-6">
<!-- Customer Name -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant font-label ml-1" for="customer_name">
                    Customer Name
                </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant/60">
<span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
</div>
<input class="w-full h-14 bg-surface-container-high border-none rounded-xl pl-12 pr-4 text-on-surface font-medium focus:ring-2 focus:ring-primary transition-all duration-200 placeholder-on-surface-variant/40" id="customer_name" placeholder="Enter customer name" type="text" value="Ali House"/>
</div>
</div>
<!-- Phone Number -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant font-label ml-1" for="phone_number">
                    Phone Number
                </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant/60">
<span class="material-symbols-outlined text-[20px]" data-icon="call">call</span>
</div>
<input class="w-full h-14 bg-surface-container-high border-none rounded-xl pl-12 pr-4 text-on-surface font-medium focus:ring-2 focus:ring-primary transition-all duration-200 placeholder-on-surface-variant/40" id="phone_number" placeholder="03XX XXXXXXX" type="tel" value="0300 1234567"/>
</div>
</div>
<!-- Additional Detail Sections (Visual interest) -->
<div class="pt-4 grid grid-cols-2 gap-4">
<div class="p-4 bg-surface-container-low rounded-xl flex flex-col items-center justify-center text-center space-y-1">
<span class="material-symbols-outlined text-secondary mb-1" data-icon="history">history</span>
<span class="text-[10px] uppercase font-bold tracking-tighter text-on-surface-variant">Last Visit</span>
<span class="text-sm font-bold text-on-surface">2 Days Ago</span>
</div>
<div class="p-4 bg-tertiary-fixed rounded-xl flex flex-col items-center justify-center text-center space-y-1">
<span class="material-symbols-outlined text-tertiary mb-1" data-icon="payments">payments</span>
<span class="text-[10px] uppercase font-bold tracking-tighter text-on-tertiary-fixed">Balance</span>
<span class="text-sm font-bold text-on-tertiary-fixed">PKR 4,500</span>
</div>
</div>
</div>
<!-- Danger Zone -->
<div class="mt-12 pt-8 border-t border-surface-variant">
<button class="w-full flex items-center justify-center gap-2 py-4 text-tertiary font-bold hover:bg-tertiary/5 rounded-xl transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
                Remove Customer
            </button>
</div>
