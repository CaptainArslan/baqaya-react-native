<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Baqaya - Customers</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#005db7",
                    "on-secondary-container": "#003670",
                    "surface-container": "#eeeeeb",
                    "on-tertiary-fixed": "#410003",
                    "tertiary-fixed": "#ffdad6",
                    "surface": "#f9f9f6",
                    "secondary-fixed": "#d6e3ff",
                    "inverse-on-surface": "#f1f1ee",
                    "on-primary-fixed": "#00201b",
                    "on-secondary": "#ffffff",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#e2e3e0",
                    "outline-variant": "#bec9c5",
                    "on-surface": "#1a1c1b",
                    "tertiary": "#90000e",
                    "surface-tint": "#046b5e",
                    "on-tertiary-container": "#ffc9c3",
                    "on-secondary-fixed-variant": "#00468c",
                    "on-surface-variant": "#3e4946",
                    "primary": "#004f45",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "on-background": "#1a1c1b",
                    "inverse-primary": "#84d5c5",
                    "surface-variant": "#e2e3e0",
                    "on-secondary-fixed": "#001b3d",
                    "secondary-fixed-dim": "#a9c7ff",
                    "surface-container-low": "#f4f4f1",
                    "inverse-surface": "#2f312f",
                    "secondary-container": "#64a1ff",
                    "on-tertiary-fixed-variant": "#93000e",
                    "tertiary-fixed-dim": "#ffb4ac",
                    "on-primary": "#ffffff",
                    "surface-dim": "#dadad7",
                    "primary-fixed-dim": "#84d5c5",
                    "primary-container": "#00695c",
                    "on-primary-fixed-variant": "#005046",
                    "primary-fixed": "#a0f2e1",
                    "on-error-container": "#93000a",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#b61b1f",
                    "surface-container-high": "#e8e8e5",
                    "error": "#ba1a1a",
                    "outline": "#6e7976",
                    "on-primary-container": "#94e5d5",
                    "surface-bright": "#f9f9f6",
                    "background": "#f9f9f6"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-primary-glow {
            background: linear-gradient(135deg, #004f45 0%, #00695c 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 dark:bg-slate-900/85 backdrop-blur-md flex items-center justify-between px-6 h-16 w-full bg-primary">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined dark:text-[#00695c] text-white" data-icon="menu">menu</span>
<h1 class="text-2xl font-extrabold tracking-tighter dark:text-[#00695c] font-headline text-white">Baqaya</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined dark:text-[#00695c] text-white" data-icon="sync">sync</span>
</div>
</header>
<main class="pt-16 pb-24 min-h-screen">
<!-- Sync Banner -->
<div class="bg-surface-container-low px-6 py-3 flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="cloud_done">cloud_done</span>
<p class="text-sm font-medium text-on-surface-variant">0 changes pending sync</p>
</div>
<button class="text-sm font-bold text-primary hover:underline">Sync Now</button>
</div>
<!-- Content Area: Empty State -->
<section class="px-6 py-20 flex flex-col items-center justify-center text-center">
<div class="w-64 h-64 mb-8 relative flex items-center justify-center">
<!-- Tonal Layering for Empty State Illustration -->
<div class="absolute inset-0 bg-surface-container-high rounded-full opacity-30 blur-2xl"></div>
<div class="relative bg-surface-container-lowest p-10 rounded-full shadow-sm border border-outline-variant/10">
<span class="material-symbols-outlined text-7xl text-outline-variant" data-icon="person_search" style="font-variation-settings: 'wght' 200;">person_search</span>
</div>
</div>
<h2 class="text-3xl font-extrabold font-headline text-on-surface mb-3 tracking-tight">No customers found</h2>
<p class="text-on-surface-variant text-lg max-w-xs leading-relaxed">Add your first customer to start your ledger and track payments.</p>
</section>
</main>
<!-- Floating Action Button -->
<button class="fixed bottom-24 right-6 bg-primary-glow text-on-primary w-16 h-16 rounded-full shadow-xl flex items-center justify-center z-40 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="person_add" style="font-variation-settings: 'FILL' 1;">person_add</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-white dark:bg-slate-950 rounded-t-xl shadow-[0_-4px_12px_rgba(0,0,0,0.04)]">
<!-- Home -->
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 font-['Inter'] text-[11px] font-medium tracking-wide">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
            Home
        </div>
<!-- Customers (Active) -->
<div class="flex flex-col items-center justify-center text-[#004f45] dark:text-[#00695c] bg-[#f4f4f1] dark:bg-slate-800 rounded-xl px-3 py-1 font-['Inter'] text-[11px] font-medium tracking-wide">
<span class="material-symbols-outlined mb-1" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
            Customers
        </div>
<!-- Cashbook -->
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 font-['Inter'] text-[11px] font-medium tracking-wide">
<span class="material-symbols-outlined mb-1" data-icon="menu_book">menu_book</span>
            Cashbook
        </div>
<!-- Reports -->
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 font-['Inter'] text-[11px] font-medium tracking-wide">
<span class="material-symbols-outlined mb-1" data-icon="assessment">assessment</span>
            Reports
        </div>
</nav>
</body></html>
