<body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-40 bg-[#f9f9f6]/85 backdrop-blur-md">
<div class="flex items-center px-4 h-16 w-full max-w-md mx-auto">
<button class="material-symbols-outlined text-[#004f45] p-2 hover:bg-slate-100 transition-colors rounded-full active:scale-95 duration-150" data-icon="arrow_back">
                arrow_back
            </button>
<h1 class="ml-4 font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#004f45]">
                Create Shop
            </h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md px-6 pt-24 pb-32">
<!-- Instructional Header Section -->
<div class="mb-10">
<div class="w-16 h-1 w-primary bg-primary rounded-full mb-6"></div>
<h2 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight leading-tight mb-3">
                Enter your shop name to get started.
            </h2>
<p class="text-on-surface-variant font-body text-base">
                This name will appear on all your digital receipts and customer ledgers.
            </p>
</div>
<!-- Hero Decorative Element -->
<div class="relative w-full aspect-[16/9] mb-10 rounded-xl overflow-hidden bg-surface-container-low flex items-center justify-center">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-secondary/5"></div>
<div class="relative flex flex-col items-center">
<div class="w-20 h-20 rounded-full bg-surface-container-lowest flex items-center justify-center shadow-xl shadow-on-surface/5 mb-4">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="storefront">storefront</span>
</div>
<div class="flex gap-2">
<div class="h-2 w-8 bg-primary rounded-full"></div>
<div class="h-2 w-2 bg-outline-variant rounded-full"></div>
<div class="h-2 w-2 bg-outline-variant rounded-full"></div>
</div>
</div>
<!-- Background Texture Simulation -->
<div class="absolute top-0 left-0 w-full h-full opacity-[0.03] pointer-events-none" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBclBCRnZNnqbTSdyBzz0_XAwlix8_NQ0ICdwGLDsEA9jAh4g_FkJBOIdGvs86lwVeLBynNehr_XNf53XAeia5rj3Wk5CMrL4swIwnsyEWgGzQTLpc_-Jsvl6FIqlOYV6tbZiqQWn93EksCleA3Tn6EQKvsZypZ4icEZkDu1wwG40ErxburTMtnAJHcApiWrR_eRZ5Jm2zsd8cMWK6pU1WGYdfj-EO1isjChesDYK1mgMWSd4ElUZWN6UglgSe94IJ_TgyrsMGtn2rc');"></div>
</div>
<!-- Single Input Field -->
<div class="space-y-2">
<label class="font-label text-sm font-semibold text-on-surface-variant ml-1" for="shop_name">
                Shop Name
            </label>
<div class="relative group">
<input class="w-full h-16 px-5 pt-1 bg-surface-container-high border-2 border-transparent rounded-xl text-on-surface text-lg font-medium placeholder:text-on-surface-variant/40 focus:ring-0 focus:border-primary focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="shop_name" placeholder="e.g., Rehman Kiryana Store" type="text"/>
<div class="absolute right-5 top-1/2 -translate-y-1/2 opacity-0 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<p class="text-[12px] font-label text-on-surface-variant/60 ml-1 px-1">
                You can change this later in settings.
            </p>
</div>
<!-- Trust Indicator -->
<div class="mt-12 p-4 rounded-xl bg-surface-container-low flex items-start gap-4">
<div class="p-2 rounded-lg bg-surface-container-lowest">
<span class="material-symbols-outlined text-primary text-xl" data-icon="security">security</span>
</div>
<div>
<h4 class="font-headline text-sm font-bold text-primary">Your data is safe</h4>
<p class="text-xs text-on-surface-variant leading-relaxed">Baqaya uses end-to-end encryption for all your financial ledger records.</p>
</div>
</div>
</main>

<div class="fixed bottom-0 left-0 w-full p-6 bg-[#f9f9f6]/95 backdrop-blur-sm">

<button class="w-full h-14 bg-primary text-on-primary font-headline font-bold text-lg rounded-xl shadow-lg shadow-primary/10 active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
