<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#a0f2e1",
                    "secondary": "#005db7",
                    "primary": "#004f45",
                    "secondary-fixed": "#d6e3ff",
                    "on-primary-fixed-variant": "#005046",
                    "primary-fixed-dim": "#84d5c5",
                    "surface-bright": "#f9f9f6",
                    "on-primary": "#ffffff",
                    "on-surface": "#1a1c1b",
                    "tertiary-fixed": "#ffdad6",
                    "on-tertiary-fixed-variant": "#93000e",
                    "inverse-primary": "#84d5c5",
                    "on-tertiary-fixed": "#410003",
                    "inverse-surface": "#2f312f",
                    "primary-container": "#00695c",
                    "on-error": "#ffffff",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#e2e3e0",
                    "error": "#ba1a1a",
                    "background": "#f9f9f6",
                    "surface-dim": "#dadad7",
                    "surface-container-low": "#f4f4f1",
                    "surface-container": "#eeeeeb",
                    "on-secondary-container": "#003670",
                    "secondary-container": "#64a1ff",
                    "outline-variant": "#bec9c5",
                    "on-surface-variant": "#3e4946",
                    "error-container": "#ffdad6",
                    "outline": "#6e7976",
                    "surface": "#f9f9f6",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#00201b",
                    "secondary-fixed-dim": "#a9c7ff",
                    "surface-variant": "#e2e3e0",
                    "on-tertiary-container": "#ffc9c3",
                    "on-primary-container": "#94e5d5",
                    "tertiary-container": "#b61b1f",
                    "inverse-on-surface": "#f1f1ee",
                    "tertiary-fixed-dim": "#ffb4ac",
                    "tertiary": "#90000e",
                    "on-secondary-fixed-variant": "#00468c",
                    "on-secondary-fixed": "#001b3d",
                    "on-secondary": "#ffffff",
                    "on-background": "#1a1c1b",
                    "surface-tint": "#046b5e",
                    "surface-container-high": "#e8e8e5"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top Navigation Bar (JSON Guided) -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f6]/85 backdrop-blur-md flex justify-between items-center px-4 h-16 w-full">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center text-[#004f45] hover:bg-stone-200/50 transition-colors rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#004f45]">Add Entry</span>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center text-stone-500 hover:bg-stone-200/50 transition-colors rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
</div>
</header>
<!-- Main Entry Content -->
<main class="flex-1 pt-20 pb-40 px-4 max-w-lg mx-auto w-full">
<!-- Transaction Type Toggle -->
<div class="flex bg-surface-container-low rounded-xl p-1 mb-8">
<button class="flex-1 py-3 px-4 rounded-lg bg-surface-container-lowest text-primary font-bold shadow-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="arrow_downward" style="font-variation-settings: 'wght' 700;">arrow_downward</span>
                Gave (Udhaar)
            </button>
<button class="flex-1 py-3 px-4 rounded-lg text-on-surface-variant font-medium flex items-center justify-center gap-2 hover:bg-stone-200/50 transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_upward">arrow_upward</span>
                Received
            </button>
</div>
<!-- High-Contrast Amount Input -->
<div class="group mb-6">
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Amount / Raqam</label>
<div class="bg-surface-container-low rounded-2xl flex items-center px-4 border border-outline-variant/30 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<span class="text-primary font-bold mr-2 text-lg">Rs.</span>
<input autofocus="" class="w-full bg-transparent border-none py-4 px-0 focus:ring-0 text-on-surface text-xl font-semibold" placeholder="0" type="number"/>
</div>
</div>
<!-- Fast Action Numeric Chips -->
<div class="grid grid-cols-3 gap-3 mb-8">
<button class="bg-surface-container-high py-4 rounded-xl text-primary font-bold hover:bg-primary hover:text-white transition-all active:scale-95 flex flex-col items-center">
<span class="text-xs opacity-70 mb-1">+</span>
<span>100</span>
</button>
<button class="bg-surface-container-high py-4 rounded-xl text-primary font-bold hover:bg-primary hover:text-white transition-all active:scale-95 flex flex-col items-center">
<span class="text-xs opacity-70 mb-1">+</span>
<span>500</span>
</button>
<button class="bg-surface-container-high py-4 rounded-xl text-primary font-bold hover:bg-primary hover:text-white transition-all active:scale-95 flex flex-col items-center">
<span class="text-xs opacity-70 mb-1">+</span>
<span>1000</span>
</button>
</div>
<!-- Optional Metadata Fields (No-Line Architecture) -->
<div class="space-y-4">
<div class="group">
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Details (Optional)</label>
<div class="bg-surface-container-low rounded-2xl flex items-center px-4 focus-within:ring-2 focus-within:ring-primary transition-all">
<span class="material-symbols-outlined text-outline" data-icon="edit_note">edit_note</span>
<input class="w-full bg-transparent border-none py-4 px-3 focus:ring-0 text-on-surface" placeholder="What is this for?" type="text"/>
</div>
</div>
<div class="group">
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Transaction Date</label>
<div class="bg-surface-container-low rounded-2xl flex items-center px-4 py-4 gap-3">
<span class="material-symbols-outlined text-outline" data-icon="calendar_today">calendar_today</span>
<span class="text-on-surface font-medium">Today, 24 Oct 2023</span>
<span class="material-symbols-outlined ml-auto text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Attachment Section -->
<div class="group">
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Add Bill/Receipt (Optional)</label>
<div class="flex gap-3">
<!-- Thumbnail Preview -->
<div class="relative w-24 h-24 rounded-2xl overflow-hidden bg-surface-container-low border border-outline-variant/30 group-active:scale-95 transition-transform">
<img alt="Bill Receipt Preview" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uhFKR_kutu83Somrq2DEgdfZJeHm23v_hci8SjNqXbaiEZ636NLnkAsMxkrP1Nlida2X7qVDq8W4HCDKEa7KpeyZ9XpkDnU72tNagqXhFHEGPFCyseLOr8qPfYbN2jjInnFdhbWlAlSBNJxj93i4Bo_C5y_DalMSObS5rwZue5Vw8V4hVWDthdXDmbNI2ijrKiD3SWpTDNfPWCJ2wB08qTBaji2eCQyKIPtzgPJm1DM4LxEjJ5hDErgf8i6stxZQwh0wJD-QQPJf8I"/>
<div class="absolute inset-0 bg-black/10"></div>
</div>
<!-- Upload Placeholder / Action -->
<div class="flex-1 flex flex-col justify-center gap-2">
<div class="flex gap-2">
<button class="flex items-center gap-2 text-primary font-bold text-sm bg-primary-fixed/30 px-4 py-2 rounded-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]" data-icon="photo_camera">photo_camera</span>
    Camera
  </button>
<button class="flex items-center gap-2 text-primary font-bold text-sm bg-primary-fixed/30 px-4 py-2 rounded-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]" data-icon="image">image</span>
    Gallery
  </button>
</div>
<p class="text-xs text-on-surface-variant ml-1">Bill_24Oct.jpg • 1.2MB</p>
</div>
</div>
<!-- Alternative Empty State (Dashed Box) -->
<!-- 
            <div class="border-2 border-dashed border-outline-variant rounded-2xl p-6 flex flex-col items-center justify-center gap-2 bg-surface-container-low hover:bg-stone-200/30 transition-colors cursor-pointer">
                <span class="material-symbols-outlined text-outline scale-125" data-icon="add_a_photo">add_a_photo</span>
                <span class="text-sm font-medium text-on-surface-variant">Tap to add bill image</span>
            </div>
            -->
</div>
</div>
<!-- Customer Context (Subtle Layering) -->
<div class="mt-8 flex items-center gap-4 p-4 bg-surface-container-low rounded-2xl">
<div class="w-12 h-12 rounded-full overflow-hidden bg-primary-fixed flex items-center justify-center">
<img alt="Customer Avatar" class="w-full h-full object-cover" data-alt="close up headshot of a friendly middle aged shop owner with a warm smile in natural daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqJ2ZyApTo0u0xJ9GJz_IrBj_QL-Su2lr3e9kfPHqfWm1gGKwQ9xVormI5ncrmmXJdjSzlqVQsK2JDknH-nGB6Bw1sTplkbFkrxnkjel493w0uCQXH0lJ3AnUNZKnOYro4Lt22naiQpOClpHUPZzR3ERkAsVFfO--bkZ1_bXnbWVAhCLDONUNsQjJ-b6lgzG60gYwrumbQZ0QgeBmPGf9W6SEUDWJtsOSOijcw0V5YYzTYlRGNbdYamafbf51WzBUh-cxX0HGpZeuN"/>
</div>
<div>
<p class="text-xs text-on-surface-variant font-medium">Adding for</p>
<h4 class="font-bold text-on-surface">Saleem Bhai (Bakery)</h4>
</div>
<button class="ml-auto text-secondary font-bold text-sm">Change</button>
</div>
</main>
<!-- Sticky Bottom Primary Action -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background/90 backdrop-blur-md z-40 max-w-lg mx-auto">
<button class="w-full py-5 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            Save / Save Karein
        </button>
</div>
</body></html>
