<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Baqaya - Cashbook Empty State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-container": "#003670",
                    "outline": "#6e7976",
                    "on-primary-container": "#94e5d5",
                    "on-primary-fixed-variant": "#005046",
                    "on-error-container": "#93000a",
                    "secondary": "#005db7",
                    "surface-variant": "#e2e3e0",
                    "primary-container": "#00695c",
                    "on-primary-fixed": "#00201b",
                    "on-secondary-fixed": "#001b3d",
                    "primary": "#004f45",
                    "surface-bright": "#f9f9f6",
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-container-high": "#e8e8e5",
                    "on-error": "#ffffff",
                    "surface-dim": "#dadad7",
                    "background": "#f9f9f6",
                    "surface-container-highest": "#e2e3e0",
                    "inverse-surface": "#2f312f",
                    "primary-fixed": "#a0f2e1",
                    "on-surface-variant": "#3e4946",
                    "tertiary-fixed": "#ffdad6",
                    "tertiary-fixed-dim": "#ffb4ac",
                    "secondary-container": "#64a1ff",
                    "on-background": "#1a1c1b",
                    "on-secondary": "#ffffff",
                    "on-surface": "#1a1c1b",
                    "tertiary": "#90000e",
                    "inverse-primary": "#84d5c5",
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#a9c7ff",
                    "on-secondary-fixed-variant": "#00468c",
                    "surface-container-low": "#f4f4f1",
                    "on-tertiary-fixed": "#410003",
                    "secondary-fixed": "#d6e3ff",
                    "on-tertiary-fixed-variant": "#93000e",
                    "error-container": "#ffdad6",
                    "surface-tint": "#046b5e",
                    "surface": "#f9f9f6",
                    "on-tertiary-container": "#ffc9c3",
                    "tertiary-container": "#b61b1f",
                    "primary-fixed-dim": "#84d5c5",
                    "outline-variant": "#bec9c5",
                    "inverse-on-surface": "#f1f1ee",
                    "surface-container": "#eeeeeb"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col pb-20">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#004f45] dark:bg-[#004f45] shadow-sm opacity-85 backdrop-blur-md flex items-center justify-between px-4 h-16 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-white cursor-pointer p-1 hover:bg-white/10 rounded-full" data-icon="menu">menu</span>
<h1 class="text-white font-headline font-bold text-xl tracking-tight">Baqaya</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-white cursor-pointer p-1 hover:bg-white/10 rounded-full" data-icon="sync">sync</span>
</div>
</header>
<main class="flex-grow pt-16">
<!-- Sync Banner -->
<div class="bg-surface-container-high py-2 px-4 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="cloud_done">cloud_done</span>
<span class="text-on-surface-variant text-xs font-medium">0 changes pending sync</span>
</div>
<!-- Summary Widgets (Bento-style compact cards) -->
<div class="p-4 grid grid-cols-2 gap-3">
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col justify-between h-28">
<p class="text-on-surface-variant text-xs font-medium font-label">Today's Ledger</p>
<p class="text-on-surface font-headline font-extrabold text-lg">Rs. 0.00</p>
</div>
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col justify-between h-28 border-l-4 border-secondary">
<p class="text-on-surface-variant text-xs font-medium font-label">Total Received</p>
<p class="text-secondary font-headline font-extrabold text-lg">Rs. 0.00</p>
</div>
</div>
<!-- Filters Section -->
<div class="px-4 mb-4 space-y-3">
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary transition-all text-sm" placeholder="Search customer name..." type="text"/>
</div>
<div class="flex gap-2">
<button class="flex-1 flex items-center justify-center gap-2 h-10 bg-surface-container-lowest border border-outline-variant/30 rounded-full text-on-surface-variant text-sm font-medium hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="calendar_today">calendar_today</span>
                    Date Filter
                </button>
<button class="flex-1 flex items-center justify-center gap-2 h-10 bg-surface-container-lowest border border-outline-variant/30 rounded-full text-on-surface-variant text-sm font-medium hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="sort">sort</span>
                    Sort
                </button>
</div>
</div>
<!-- Main Content: Empty State -->
<div class="flex-grow flex flex-col items-center justify-center px-8 py-12 text-center">
<div class="mb-6 w-48 h-48 bg-surface-container-low rounded-full flex items-center justify-center relative overflow-hidden">
<!-- Abstract visual representation using gradients and shapes instead of images -->
<div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary to-transparent"></div>
<span class="material-symbols-outlined text-7xl text-outline-variant/50" data-icon="receipt_long">receipt_long</span>
<span class="material-symbols-outlined absolute top-1/3 right-1/3 text-4xl text-primary/20" data-icon="history_edu">history_edu</span>
</div>
<h2 class="text-on-surface font-headline font-bold text-xl mb-2">No transactions found</h2>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-xs">
                Add your first entry to see activity here. Track all your cash flows securely in one place.
            </p>
<button class="mt-8 bg-primary text-on-primary font-headline font-bold px-8 py-3 rounded-full flex items-center gap-2 shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="add">add</span>
                New Entry
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-white dark:bg-[#1a1c1b] border-t border-gray-100 dark:border-gray-800 shadow-[0_-4px_16px_rgba(0,0,0,0.06)] flex justify-around items-center h-20 w-full px-2 pb-safe">
<button class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 py-1 px-3 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-inter text-xs font-medium">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 py-1 px-3 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-inter text-xs font-medium">Customers</span>
</button>
<!-- ACTIVE TAB -->
<button class="flex flex-col items-center justify-center bg-[#f4f4f1] dark:bg-[#004f45]/20 text-[#004f45] dark:text-[#00695c] rounded-xl py-1 px-3 scale-95 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="receipt_long" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-inter text-xs font-medium">Cashbook</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 py-1 px-3 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="assessment">assessment</span>
<span class="font-inter text-xs font-medium">Reports</span>
</button>
</nav>
</body></html>
