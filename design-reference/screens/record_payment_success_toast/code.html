<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f6;
            color: #1a1c1b;
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

<header class="fixed top-0 w-full z-50 bg-[#f9f9f6]/85 backdrop-blur-md shadow-none transition-all duration-200 active:opacity-70">
<div class="flex justify-between items-center px-4 h-16 w-full max-w-md mx-auto">
<div class="flex items-center gap-3">
<button class="text-[#004f45] p-2 hover:bg-slate-100 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#004f45]">Receive Payment / Wasool Karein</h1>

<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden">

</div>
</div>
</header>
<main class="pt-20 px-4 max-w-md mx-auto space-y-4">
<!-- Transaction Type Toggle (Updated to Tabbed Navigation) -->
<div class="flex bg-surface-container-low rounded-xl p-1">
<button class="flex-1 py-3 px-4 rounded-lg text-on-surface-variant font-medium flex items-center justify-center gap-2 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_downward">arrow_downward</span>
                Gave / Diye
            </button>
<button class="flex-1 py-3 px-4 rounded-lg bg-surface-container-lowest text-primary font-bold shadow-sm flex items-center justify-center gap-2"><span class="material-symbols-outlined" data-icon="arrow_upward" style="font-variation-settings: 'wght' 700;">arrow_upward</span>
                Received</button>
</div>
<!-- Customer Info Card -->
<section class="bg-surface-container-lowest rounded-xl p-5 shadow-[0_-4px_16px_rgba(0,0,0,0.03)] border-l-4 border-secondary">
<div class="flex justify-between items-center">
<div>
<p class="text-on-surface-variant text-xs font-medium mb-1">CUSTOMER NAME / NAM</p>
<h2 class="text-on-surface font-headline font-extrabold text-2xl tracking-tight">Ali House</h2>
</div>
<div class="text-right">
<p class="text-on-surface-variant text-[10px] font-bold uppercase mb-1 tracking-wider">Balance</p>
<span class="text-secondary font-headline font-extrabold text-xl">Rs. 24,500</span>
</div>
</div>
</section>
<!-- Amount Input Section -->
<section class="space-y-3">
<label class="block text-on-surface-variant text-sm font-semibold px-1 mb-2">
                AMOUNT RECEIVED / WASOOL RAKAM

<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="text-on-surface-variant font-semibold text-lg">Rs.</span>
</div>
<input autofocus="" class="w-full bg-surface-container-low border-2 border-outline-variant focus:border-primary focus:ring-0 rounded-xl py-4 pl-14 pr-4 text-xl font-headline font-bold text-on-surface transition-all duration-200 outline-none" placeholder="0.00" type="number"/>
</div>
</section>
<!-- Payment Method Selection -->
<section class="space-y-3">
<label class="block text-on-surface-variant text-sm font-semibold px-1">

<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-primary text-on-primary shadow-lg scale-100 active:scale-95 transition-all">
<span class="material-symbols-outlined mb-2 text-2xl" data-icon="payments">payments</span>
<span class="text-xs font-bold font-label uppercase">Cash</span>
<span class="text-[10px] opacity-80">Naqad</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-lowest text-on-surface-variant border-2 border-surface-container-high hover:border-primary/30 active:scale-95 transition-all">
<span class="material-symbols-outlined mb-2 text-2xl" data-icon="account_balance">account_balance</span>
<span class="text-xs font-bold font-label uppercase">Bank</span>
<span class="text-[10px] opacity-80">Bank Se</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-lowest text-on-surface-variant border-2 border-surface-container-high hover:border-primary/30 active:scale-95 transition-all">
<span class="material-symbols-outlined mb-2 text-2xl" data-icon="devices">devices</span>
<span class="text-xs font-bold font-label uppercase">Online</span>
<span class="text-[10px] opacity-80">Digital</span>
</button>
</div>
</section>
<!-- Notes Section -->
<section class="space-y-3">
<label class="block text-on-surface-variant text-sm font-semibold px-1">
                ADD NOTE / TAFSEEL (OPTIONAL)
            </label>
<textarea class="w-full bg-surface-container-high border-2 border-transparent focus:border-primary focus:ring-0 rounded-xl p-4 text-on-surface font-body resize-none transition-all" placeholder="Write any details here..." rows="2"></textarea>
</section>
<!-- Summary Live Preview -->
<section class="bg-surface-container-low rounded-xl p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-tertiary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" data-icon="calculate">calculate</span>
</div>
<div>
<p class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider">New Balance / Naya Baqi</p>
<p class="text-sm font-body text-on-surface">Updated ledger amount</p>
</div>
</div>
<div class="text-right">
<span class="text-xl font-headline font-extrabold text-on-surface">Rs. 24,500</span>
</div>

<!-- Fixed Action Bottom Area -->
<!-- Success Toast -->
<div class="fixed bottom-24 left-4 right-4 z-[60] max-w-md mx-auto">
<div class="bg-zinc-900 text-white px-4 py-3 rounded-lg shadow-2xl flex items-center justify-between animate-bounce-short">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-green-400 font-bold" style="font-variation-settings: 'FILL' 1;">check_circle</span>

<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-headline font-bold text-lg rounded-xl flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-md py-4"><span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                SAVE PAYMENT</button>
<p class="text-center text-[10px] text-on-surface-variant mt-3 font-medium uppercase tracking-widest">Transaction is secured &amp; encrypted</p>
</div>
</div>
