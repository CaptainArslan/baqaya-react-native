<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 backdrop-blur-md bg-surface/85 flex items-center justify-between px-4 h-16 transition-all duration-200">
<div class="flex items-center gap-4">

<h1 class="font-plus-jakarta-sans font-bold text-lg text-teal-900">Language Settings</h1>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow pt-20 pb-24 px-4 max-w-lg mx-auto w-full">
<!-- Instructional Header -->
<div class="mb-8 mt-4">
<h2 class="text-2xl font-extrabold text-primary mb-2">Choose your language</h2>
<p class="text-on-surface-variant font-medium">Select the language that suits your business workflow best.</p>
</div>
<!-- Language Selection Group -->
<div class="space-y-4">
<!-- Option 1: English -->
<label class="group relative flex flex-col cursor-pointer transition-transform active:scale-[0.98]">
<input checked="" class="peer hidden" name="language" type="radio" value="english"/>
<div class="p-5 rounded-xl bg-surface-container-lowest peer-checked:bg-primary-container/[0.08] peer-checked:ring-2 peer-checked:ring-primary transition-all duration-200 shadow-sm">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-primary transition-colors group-hover:bg-primary-fixed">
<span class="material-symbols-outlined text-2xl" data-icon="language">language</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg text-on-surface">English</h3>
<p class="text-sm text-on-surface-variant">Default international language</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-all">
<div class="w-2.5 h-2.5 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</div>
</div>
<!-- Hidden indicator that shows when input is peer-checked -->
<div class="hidden peer-checked:block absolute right-5 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</label>
<!-- Option 2: Urdu -->
<label class="group relative flex flex-col cursor-pointer transition-transform active:scale-[0.98]">
<input class="peer hidden" name="language" type="radio" value="urdu"/>
<div class="p-5 rounded-xl bg-surface-container-lowest peer-checked:bg-primary-container/[0.08] peer-checked:ring-2 peer-checked:ring-primary transition-all duration-200 shadow-sm">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-primary transition-colors group-hover:bg-primary-fixed">
<span class="material-symbols-outlined text-2xl" data-icon="translate">translate</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg text-on-surface">اردو (Urdu)</h3>
<p class="text-sm text-on-surface-variant">National language</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center transition-all">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 group-hover:opacity-10"></div>
</div>
</div>
</div>
<div class="hidden peer-checked:block absolute right-5 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</label>
<!-- Option 3: Roman Urdu -->
<label class="group relative flex flex-col cursor-pointer transition-transform active:scale-[0.98]">
<input class="peer hidden" name="language" type="radio" value="roman_urdu"/>
<div class="p-5 rounded-xl bg-surface-container-lowest peer-checked:bg-primary-container/[0.08] peer-checked:ring-2 peer-checked:ring-primary transition-all duration-200 shadow-sm">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-primary transition-colors group-hover:bg-primary-fixed">
<span class="material-symbols-outlined text-2xl" data-icon="keyboard">keyboard</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg text-on-surface">Roman Urdu</h3>
<p class="text-sm text-on-surface-variant">Asaan Urdu typing mein</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center transition-all">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 group-hover:opacity-10"></div>
</div>
</div>
</div>
<div class="hidden peer-checked:block absolute right-5 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</label>
</div>

<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent flex items-end p-4">

</div>
