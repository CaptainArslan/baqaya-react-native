<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<!-- The TopAppBar headline/brand text is styled as a heavy, premium anchor per design system -->
<header class="fixed top-0 w-full backdrop-blur-md bg-[#f9f9f6]/85 z-50 flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-3">

</div>
<button class="p-2 rounded-full hover:bg-[#f4f4f1] transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-slate-500" data-icon="account_circle">account_circle</span>
</button>
</header>

<div class="relative w-full aspect-square mb-12 flex items-center justify-center">

<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl scale-75"></div>
<div class="relative z-10 w-full h-full rounded-full overflow-hidden bg-surface-container-low flex items-center justify-center">

</div>
</div>

<div class="space-y-4">
<h2 class="headline-font text-3xl font-extrabold text-on-surface tracking-tight leading-tight">
                Welcome to Baqaya
            </h2>
<p class="text-on-surface-variant text-base leading-relaxed max-w-xs mx-auto">
                Your digital ledger is ready. Start by adding your first customer to track udhaar and payments.
            </p>
</div>
<!-- Visual "Bedrock" Element (Asymmetric Detail) -->
<div class="mt-12 flex gap-2 justify-center">
<div class="w-1.5 h-1.5 rounded-full bg-primary/20"></div>
<div class="w-8 h-1.5 rounded-full bg-primary/40"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/20"></div>
</div>
</main>
<!-- Bottom Action Area -->
<!-- Suppression Logic: Navigation is suppressed as this is a focused onboarding/empty state journey -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background to-transparent">
<div class="max-w-md mx-auto">
<button class="w-full h-[56px] bg-primary-container text-on-primary rounded-xl font-bold text-base shadow-sm active:scale-[0.98] transition-transform flex items-center justify-center gap-3">
