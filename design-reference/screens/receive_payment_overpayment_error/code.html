<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#e2e3e0",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#b61b1f",
                        "surface-variant": "#e2e3e0",
                        "tertiary": "#90000e",
                        "secondary-container": "#64a1ff",
                        "surface-dim": "#dadad7",
                        "surface-container": "#eeeeeb",
                        "surface-container-low": "#f4f4f1",
                        "on-tertiary-fixed": "#410003",
                        "surface-container-high": "#e8e8e5",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#a9c7ff",
                        "on-tertiary-fixed-variant": "#93000e",
                        "on-background": "#1a1c1b",
                        "secondary": "#005db7",
                        "on-secondary-fixed": "#001b3d",
                        "tertiary-fixed": "#ffdad6",
                        "on-tertiary-container": "#ffc9c3",
                        "on-primary-container": "#94e5d5",
                        "on-surface": "#1a1c1b",
                        "on-primary-fixed": "#00201b",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f312f",
                        "background": "#f9f9f6",
                        "inverse-on-surface": "#f1f1ee",
                        "secondary-fixed": "#d6e3ff",
                        "primary-fixed-dim": "#84d5c5",
                        "error": "#ba1a1a",
                        "primary-fixed": "#a0f2e1",
                        "primary": "#004f45",
                        "surface-tint": "#046b5e",
                        "inverse-primary": "#84d5c5",
                        "primary-container": "#00695c",
                        "on-secondary-container": "#003670",
                        "outline": "#6e7976",
                        "on-surface-variant": "#3e4946",
                        "tertiary-fixed-dim": "#ffb4ac",
                        "surface": "#f9f9f6",
                        "on-primary-fixed-variant": "#005046",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f9f9f6",
                        "on-secondary-fixed-variant": "#00468c",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#bec9c5",
                        "on-secondary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f6]/85 backdrop-blur-md flex justify-between items-center px-4 h-16 w-full">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-stone-200/50 active:scale-95 transition-transform duration-200 text-[#004f45]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight text-[#004f45]">Receive Payment</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border-2 border-primary/10">
<img alt="Shopkeeper Profile" class="w-full h-full object-cover" data-alt="Portrait of a smiling professional shopkeeper in a clean workspace with soft daylighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDc_CEBEPgaT6NJl4yfrbD24E8xRM4yKUJWMuvcFGX893yNVtdEfkhBzo9TxSoO_taspJYV9qs7VlZc6XepR4ySvkqSS6EPD7kMPg3cWPq7TYDVK8ZJHXJmzc0O0u1i_sQMgMEMDztEbd0qkmP66QPqo8nG1ViVqaUtmMt_g3e5sAiOjfuKwKPJbVzrE5ktFjScOQQ2BQ-iw8PG8P0OrCTzSUsoxa1U7LrwL5kAKDnbGcy16UXGyHiMBbpA7aMQTeI13AjYvOTBOU7y"/>
</div>
</header>
<main class="pt-20 pb-24 px-4 max-w-md mx-auto">
<!-- Customer Context Card -->
<section class="mb-6">
<div class="bg-surface-container-lowest p-5 rounded-xl shadow-sm border-l-4 border-secondary">
<div class="flex justify-between items-start mb-4">
<div>
<p class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1">Customer</p>
<h2 class="text-2xl font-extrabold text-on-surface">Ali House</h2>
</div>
<span class="bg-secondary-fixed text-on-secondary-fixed text-[10px] px-2 py-1 rounded-full font-bold uppercase">Active Ledger</span>
</div>
<div class="flex items-center justify-between pt-4 border-t border-surface-container">
<p class="text-on-surface-variant text-sm">Outstanding Balance</p>
<p class="text-xl font-bold text-on-surface">Rs. 24,500</p>
</div>
</div>
</section>
<!-- Payment Input Section -->
<section class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-on-surface ml-1">Amount Received</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-lg font-bold text-on-surface-variant">Rs.</span>
<input class="w-full h-16 bg-surface-container-high border-2 border-error rounded-xl pl-12 pr-4 text-2xl font-bold text-tertiary focus:ring-0 focus:border-error outline-none transition-all" type="text" value="30,000"/>
</div>
<!-- Inline Error Message -->
<div class="flex items-center gap-2 mt-1 px-1 text-tertiary">
<span class="material-symbols-outlined text-sm">error</span>
<p class="text-xs font-bold leading-tight">Payment cannot exceed outstanding balance</p>
</div>
</div>
<!-- Payment Methods -->
<div class="space-y-3">
<label class="text-sm font-semibold text-on-surface ml-1">Payment Method</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-primary text-on-primary shadow-lg border-2 border-primary active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">payments</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Cash</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-surface-container-lowest border-2 border-outline-variant text-on-surface-variant hover:border-primary/30 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">account_balance</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Bank</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-surface-container-lowest border-2 border-outline-variant text-on-surface-variant hover:border-primary/30 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">qr_code_2</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Online</span>
</button>
</div>
</div>
<!-- Notes Section -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-on-surface ml-1">Reference / Note (Optional)</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl p-4 text-sm focus:border-primary focus:ring-0 transition-colors" placeholder="E.g. Full settlement for Invoice #402" rows="3"></textarea>
</div>
</section>
<!-- Date Display (Read-only as per typical high-trust entry) -->
<div class="mt-6 flex items-center justify-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-sm">calendar_today</span>
<span class="text-xs font-medium">Entry Date: Today, Oct 24, 2023</span>
</div>
</main>
<!-- Bottom Action Bar (Floating Above Nav) -->
<div class="fixed bottom-0 left-0 w-full z-40 bg-surface-container-lowest p-4 pb-safe flex flex-col gap-3 shadow-[0_-8px_24px_rgba(0,0,0,0.04)]">
<button class="w-full h-14 bg-surface-container-highest text-on-surface-variant rounded-xl font-bold text-lg flex items-center justify-center gap-2 cursor-not-allowed transition-colors" disabled="">
<span class="material-symbols-outlined">save</span>
            Save Payment
        </button>
</div>
<!-- Navigation Bar - Suppressed for focused Task Flow -->
<!-- (Hidden as per "Destination Rule" for task-focused screens) -->
</body></html>
